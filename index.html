<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>歷屆考題導覽</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: rgba(255,255,255,0.07);
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --gold-dim: rgba(201,168,76,0.15);
      --text: #e8e0d0;
      --text-muted: rgba(232,224,208,0.45);
      --accent: #c9a84c;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Serif TC', serif;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* Radial glow */
    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 900px;
      height: 600px;
      background: radial-gradient(ellipse at center, rgba(201,168,76,0.10) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 80px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 64px;
      animation: fadeDown 0.8s ease both;
    }

    .header-label {
      font-size: 11px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 20px;
      opacity: 0.8;
    }

    .header-title {
      font-family: 'Playfair Display', 'Noto Serif TC', serif;
      font-size: clamp(2.2rem, 6vw, 4rem);
      font-weight: 900;
      line-height: 1.1;
      background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, #a07830 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }

    .header-sub {
      font-size: 14px;
      color: var(--text-muted);
      letter-spacing: 2px;
    }

    .divider {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 24px auto 0;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 960px;
    }

    /* Card */
    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 36px 24px;
      transition: transform 0.3s cubic-bezier(.22,1,.36,1), border-color 0.3s, box-shadow 0.3s;
      animation: fadeUp 0.6s ease both;
    }

    .card:nth-child(1)  { animation-delay: 0.05s; }
    .card:nth-child(2)  { animation-delay: 0.10s; }
    .card:nth-child(3)  { animation-delay: 0.15s; }
    .card:nth-child(4)  { animation-delay: 0.20s; }
    .card:nth-child(5)  { animation-delay: 0.25s; }
    .card:nth-child(6)  { animation-delay: 0.30s; }
    .card:nth-child(7)  { animation-delay: 0.35s; }
    .card:nth-child(8)  { animation-delay: 0.40s; }
    .card:nth-child(9)  { animation-delay: 0.45s; }
    .card:nth-child(10) { animation-delay: 0.50s; }

    /* Shimmer line on top */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    /* Corner decorations */
    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gold-dim);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: rgba(201,168,76,0.4);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 30px rgba(201,168,76,0.08);
    }

    .card:hover::before { opacity: 1; }
    .card:hover::after  { opacity: 1; }

    .card-num {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      font-weight: 900;
      line-height: 1;
      color: var(--gold);
      position: relative;
      z-index: 1;
      transition: color 0.3s;
    }

    .card:hover .card-num {
      color: var(--gold-light);
    }

    .card-label {
      font-size: 13px;
      letter-spacing: 3px;
      color: var(--text-muted);
      margin-top: 10px;
      position: relative;
      z-index: 1;
    }

    .card-arrow {
      margin-top: 20px;
      width: 28px;
      height: 28px;
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      transition: border-color 0.3s, background 0.3s, transform 0.3s;
    }

    .card:hover .card-arrow {
      border-color: var(--gold);
      background: var(--gold-dim);
      transform: rotate(45deg);
    }

    .card-arrow svg {
      width: 12px;
      height: 12px;
      stroke: var(--gold);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Footer */
    .footer {
      margin-top: 64px;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 2px;
      animation: fadeUp 0.6s 0.6s ease both;
    }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
      .card { padding: 28px 16px; }
      .card-num { font-size: 2.2rem; }
    }
  </style>
</head>
